# Basic settings
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Enable true color support (for modern terminals)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# -- Catppuccin Mocha Theme --

# Center the window list in the status bar
set -g status-justify centre

# Status bar background
set -g status-style bg="#1e1e2e",fg="#cdd6f4"

# Left: Session name
set -g status-left-style bg="#313244",fg="#cdd6f4"
set -g status-left " #S "

# Right: Time/date in subtext
set -g status-right-style bg="#313244",fg="#a6adc8"
set -g status-right " %H:%M %d-%b-%y "

# Window status (inactive): subtle, muted
set -g window-status-style bg="#1e1e2e",fg="#585b70"
set -g window-status-format " #I:#W#F "

# Window status (active): highlighted with mauve
set -g window-status-current-style bg="#1e1e2e",fg="#cba6f7",bold
set -g window-status-current-format " #I:#W#F "

# Pane borders: subtle overlay
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#cba6f7"

# Message style
set -g message-style bg="#313244",fg="#cdd6f4"

# Mode style (copy mode etc.)
set -g mode-style bg="#cba6f7",fg="#1e1e2e"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize tpm
run '~/.config/tmux/plugins/tpm/tpm'
