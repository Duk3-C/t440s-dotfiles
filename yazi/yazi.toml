[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Open in NeoVim" },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open with default app" },
]
pdf = [
  { run = 'zathura "$@"', desc = "Open in Zathura" },
]
view = [
  { run = 'imv "$@"', desc = "View with imv" },
]

[open]
rules = [
  { mime = "application/zip", use = "extract" },
  { mime = "application/x-zstd", use = "extract" },
  { mime = "application/gzip", use = "extract" },
  { mime = "application/x-bzip2", use = "extract" },
  { mime = "application/x-tar", use = "extract" },
  { mime = "application/x-7z-compressed", use = "extract" },
  { mime = "application/x-rar", use = "extract" },
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/javascript", use = "edit" },
  { mime = "application/x-shellscript", use = "edit" },
  { mime = "application/x-ruby", use = "edit" },
  { mime = "application/x-python", use = "edit" },
  { mime = "application/toml", use = "edit" },
  { mime = "application/yaml", use = "edit" },
  { mime = "application/x-yaml", use = "edit" },
  { mime = "application/xml", use = "edit" },
  { mime = "application/pdf", use = "pdf" },
  { mime = "image/png", use = "view" },
  { mime = "image/jpeg", use = "view" },
  { mime = "image/webp", use = "view" },
]

[extract]
default = [
  { run = "ya pub extract --list %s", desc = "Extract here" },
]
